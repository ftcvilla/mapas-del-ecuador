<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
  </head>
  <body>

    <article style="max-width: 900px; margin: auto; line-height: 1.6;">
      
      <h1>{{ page.title }}</h1>
      
    {% if page.image %}
<p style="text-align:center;">
  <a href="{{ page.image | relative_url }}" target="_blank">
    <img
      src="{{ page.image | relative_url }}"
      alt="{{ page.title }}"
      style="max-width:100%; height:auto;">
  </a>
</p>
{% endif %}

<p><strong>Libro de origen:</strong> {{ page.libro_de_origen }}</p>

<p><strong>Autor del libro:</strong> {{ page.autor_del_libro }}</p>

<p><strong>Año:</strong> {{ page.anio }}</p>

{% if page.trazado_por %}
<p><strong>Trazado por:</strong> {{ page.trazado_por }}</p>
{% endif %}

<p><strong>Tamaño:</strong> {{ page.tamano }}</p>

      <p>
  <a href="{{ page.image | relative_url }}" target="_blank">
    Descargar imagen
  </a>
</p>
      <hr>

      {{ content }}

    </article>

  </body>
</html>
