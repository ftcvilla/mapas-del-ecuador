<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
  </head>
  <body>

    <article style="max-width: 750px; margin: auto; line-height: 1.6;">

      <h1>{{ page.title }}</h1>
      
      {% if page.imagen %}
<p>
  <img src="{{ page.imagen | relative_url }}" alt="{{ page.title }}" style="max-width:100%;">
</p>
{% endif %}

      <p><strong>Año:</strong> {{ page.anio }}</p>
      <p><strong>Autor:</strong> {{ page.autor }}</p>
      <p><strong>Tamaño:</strong> {{ page.tamano }}</p>
      <p><strong>Libro de origen:</strong> {{ page.libro_de_origen }}</p>

      <hr>

      {{ content }}

    </article>

  </body>
</html>
